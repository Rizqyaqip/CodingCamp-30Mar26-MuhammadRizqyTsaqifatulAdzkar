<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Expense & Budget Visualizer</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <main>
            <section class="balance-section">
                <h2>Total Spending</h2>
                <div id="balance-display" class="balance-display">Rp 0</div>
            </section>

            <section class="input-section">
                <h2>Add Transaction</h2>
                <div id="error-message" class="error-message" role="alert"></div>
                <form id="transaction-form" class="transaction-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" name="item-name" placeholder="Enter item name" maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" placeholder="0" step="1" min="1">
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category">
                            <option value="">Select category</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Transaction</button>
                </form>
            </section>

            <section class="category-section">
                <h3>Create Custom Category</h3>
                <div id="category-error-message" class="error-message" role="alert"></div>
                <form id="category-form" class="category-form">
                    <div class="form-group">
                        <label for="category-name">Category Name</label>
                        <input type="text" id="category-name" name="category-name" placeholder="Enter category name" maxlength="50">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Category</button>
                </form>
            </section>

            <section class="sort-section">
                <h3>Sort Transactions</h3>
                <div class="sort-controls">
                    <label for="sort-by">Sort by:</label>
                    <select id="sort-by" name="sort-by">
                        <option value="default">Default (Order Added)</option>
                        <option value="amount">Amount</option>
                        <option value="category">Category</option>
                    </select>
                    <label for="sort-order">Order:</label>
                    <select id="sort-order" name="sort-order">
                        <option value="asc">Ascending</option>
                        <option value="desc">Descending</option>
                    </select>
                </div>
            </section>

            <section class="transaction-section">
                <h2>Transactions</h2>
                <div id="transaction-list" class="transaction-list">
                    <p class="empty-state">No transactions yet</p>
                </div>
            </section>

            <section class="chart-section">
                <h2>Spending by Category</h2>
                <div class="chart-container">
                    <canvas id="pie-chart" width="400" height="400"></canvas>
                    <div id="chart-legend" class="chart-legend"></div>
                </div>
                <div id="chart-empty-state" class="empty-state">Add transactions to see spending breakdown</div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
